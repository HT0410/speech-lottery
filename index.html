<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3分間スピーチ お題抽選器</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0d0f1a;
      --surface: #161929;
      --border:  #2a2f4a;
      --accent:  #f5c842;
      --teal:    #4ecdc4;
      --red:     #ff6b6b;
      --purple:  #a78bfa;
      --orange:  #fb923c;
      --text:    #eef0ff;
      --muted:   #6b7199;
      --radius:  16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 18px; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 44px 20px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,200,66,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,.035) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* ===================== LOTTERY VIEW ===================== */
    #lottery-view {
      position: relative; z-index: 1;
      width: 100%; max-width: 920px;
      display: flex; flex-direction: column; gap: 30px;
    }

    header { text-align: center; }
    .label {
      display: inline-block; font-family: 'DM Mono', monospace;
      font-size: .72rem; letter-spacing: .18em; color: var(--accent);
      border: 1px solid var(--accent); padding: 5px 14px;
      border-radius: 100px; margin-bottom: 18px; text-transform: uppercase;
    }
    h1 { font-size: 2.45rem; font-weight: 900; letter-spacing:-.01em; line-height:1.18; }
    h1 span { color: var(--accent); }
    .meta { margin-top:12px; font-size:.9rem; color:var(--muted); font-family:'DM Mono',monospace; }

    #category-badge {
      display: inline-block; font-size:.82rem; font-family:'DM Mono',monospace;
      letter-spacing:.09em; padding:6px 16px; border-radius:100px;
      background:var(--border); color:var(--muted); transition:all .35s; margin-bottom:18px;
    }
    #category-badge.active { background:rgba(245,200,66,.13); color:var(--accent); border:1px solid rgba(245,200,66,.3); }

    .display-wrap { position: relative; }
    .display-wrap::before, .display-wrap::after {
      content:''; position:absolute; width:18px; height:18px;
      border-color:var(--accent); border-style:solid; opacity:.55; z-index:2; transition:opacity .3s;
    }
    .display-wrap::before { top:-4px; left:-4px; border-width:2px 0 0 2px; }
    .display-wrap::after  { bottom:-4px; right:-4px; border-width:0 2px 2px 0; }
    .display-wrap.rolling::before,
    .display-wrap.rolling::after { animation:corner-pulse .45s ease-in-out infinite alternate; opacity:1; }
    @keyframes corner-pulse { to { opacity:.15; } }

    #odai-display {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:56px 46px; min-height:260px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; gap:14px; transition:border-color .3s, box-shadow .3s;
    }
    #odai-display.rolling { border-color:var(--accent); box-shadow:0 0 36px rgba(245,200,66,.11),inset 0 0 50px rgba(245,200,66,.04); }
    #odai-display.decided { border-color:var(--teal); box-shadow:0 0 44px rgba(78,205,196,.16),inset 0 0 50px rgba(78,205,196,.04); }
    .odai-text { font-size:1.85rem; font-weight:700; line-height:1.65; color:var(--text); transition:color .3s; }
    #odai-display.rolling .odai-text { color:rgba(245,200,66,.8); font-family:'DM Mono',monospace; font-size:1.35rem; }
    #odai-display.decided .odai-text { color:#fff; }
    .placeholder-text { color:var(--muted); font-size:1.35rem; }
    @keyframes pop-in { 0%{transform:scale(.9);opacity:0} 65%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
    .decided .odai-text { animation:pop-in .42s cubic-bezier(.34,1.56,.64,1) forwards; }

    .progress-bar-wrap { height:3px; background:var(--border); border-radius:100px; overflow:hidden; opacity:0; transition:opacity .3s; }
    .progress-bar-wrap.visible { opacity:1; }
    #progress-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--teal)); border-radius:100px; transition:width .05s linear; }

    .btn-row { display:flex; gap:14px; flex-wrap:wrap; }

    button {
      font-family:'Zen Kaku Gothic New',sans-serif; font-weight:700;
      border:none; border-radius:100px; cursor:pointer;
      transition:transform .15s, box-shadow .15s, opacity .2s, background .2s;
    }
    button:active:not(:disabled) { transform:scale(.97); }
    button:disabled { opacity:.38; cursor:not-allowed; }

    #draw-btn {
      flex:1; padding:22px 32px; font-size:1.18rem;
      background:var(--accent); color:#0d0f1a;
      box-shadow:0 4px 22px rgba(245,200,66,.28);
    }
    #draw-btn:hover:not(:disabled) { box-shadow:0 6px 30px rgba(245,200,66,.48); transform:translateY(-1px); }

    #skip-btn {
      padding:22px 24px; font-size:1rem;
      background:var(--surface); color:var(--muted);
      border:1px solid var(--border); display:none;
    }
    #skip-btn:hover:not(:disabled) { background:var(--border); color:var(--text); }
    #skip-btn.visible { display:block; }

    /* コンパクトタイマーバー（抽選画面下部） */
    .timer-bar {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:24px 28px;
      display:flex; align-items:center; gap:18px;
    }
    .timer-bar-digits {
      font-family:'DM Mono',monospace; font-size:2.25rem; font-weight:500;
      color:var(--teal); flex-shrink:0; min-width:96px;
    }
    .timer-bar-label { font-size:1rem; color:var(--muted); flex:1; line-height:1.5; }
    #start-small-btn {
      padding:16px 28px; font-size:1rem;
      background:rgba(78,205,196,.15); color:var(--teal);
      border:1px solid rgba(78,205,196,.3);
    }
    #start-small-btn:hover:not(:disabled) { background:rgba(78,205,196,.25); box-shadow:0 0 16px rgba(78,205,196,.2); }

    #lottery-footer { text-align:center; font-size:.9rem; color:var(--muted); font-family:'DM Mono',monospace; }

    #fullscreen-btn {
      position: fixed; top: 16px; right: 16px; z-index: 200;
      padding: 12px 18px; font-size: .95rem;
      background: rgba(22,25,41,.86); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      backdrop-filter: blur(8px);
    }
    #fullscreen-btn:hover { background: var(--border); }

    /* ===================== TIMER VIEW ===================== */
    #timer-view {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; padding: 44px 28px;
    }
    #timer-view.active { display: flex; }

    /* 背景グリッド（timer-view内にも） */
    #timer-view::before {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(245,200,66,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,.035) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }

    .tv-inner {
      position: relative; z-index: 1;
      width: 100%; max-width: 920px;
      display: flex; flex-direction: column; align-items: center; gap: 36px;
    }

    /* タイマービュー上部：お題ミニ表示 */
    .tv-odai-mini {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:30px 36px;
      text-align:center; width:100%;
    }
    .tv-odai-mini .mini-cat {
      font-size:.8rem; font-family:'DM Mono',monospace; letter-spacing:.12em;
      color:var(--muted); text-transform:uppercase; margin-bottom:10px;
    }
    .tv-odai-mini .mini-text {
      font-size:1.65rem; font-weight:700; line-height:1.55; color:var(--text);
    }

    /* 大きな円形タイマー */
    .tv-ring-wrap {
      position: relative; width: 360px; height: 360px;
    }
    .tv-ring-wrap svg { transform:rotate(-90deg); width:100%; height:100%; }
    #tv-ring-bg   { stroke:var(--border); }
    #tv-ring-fill {
      stroke:var(--teal); stroke-linecap:round;
      transition:stroke-dashoffset 1s linear, stroke .5s;
    }
    #tv-ring-fill.warning { stroke:var(--orange); }
    #tv-ring-fill.danger  { stroke:var(--red); }

    .tv-digits-wrap {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    }
    #tv-digits {
      font-family:'DM Mono',monospace; font-size:5.9rem; font-weight:500;
      letter-spacing:-.03em; transition:color .4s;
      line-height:1;
    }
    #tv-digits.warning { color:var(--orange); }
    #tv-digits.danger  { color:var(--red); animation:tv-blink .55s ease-in-out infinite alternate; }
    @keyframes tv-blink { to { opacity:.35; } }

    #tv-phase-label {
      font-size:1rem; font-family:'DM Mono',monospace; letter-spacing:.1em;
      color:var(--muted); text-transform:uppercase; transition:color .4s;
    }

    /* マイルストーンフラッシュ */
    @keyframes milestone-flash {
      0%    { opacity:0; transform:scale(.85); }
      10%   { opacity:1; transform:scale(1.05); }
      80%   { opacity:1; transform:scale(1); }
      100%  { opacity:0; transform:scale(1); }
    }
    #milestone-msg {
      font-family:'DM Mono',monospace; font-size:1.2rem;
      letter-spacing:.1em; color:var(--accent);
      min-height:24px; text-align:center;
      opacity:0; text-transform:uppercase;
    }
    #milestone-msg.flash { animation:milestone-flash 6.5s ease-out forwards; }

    /* タイマービューボタン群 */
    .tv-btn-row { display:flex; gap:16px; width:100%; }
    #tv-pause-btn {
      flex:1; padding:20px; font-size:1.12rem;
      background:rgba(78,205,196,.15); color:var(--teal);
      border:1px solid rgba(78,205,196,.3);
    }
    #tv-pause-btn:hover:not(:disabled) { background:rgba(78,205,196,.25); }
    #tv-pause-btn.paused {
      background:rgba(245,200,66,.12); color:var(--accent);
      border-color:rgba(245,200,66,.3);
    }
    #tv-stop-btn {
      padding:20px 28px; font-size:1rem;
      background:var(--surface); color:var(--muted);
      border:1px solid var(--border);
    }
    #tv-stop-btn:hover:not(:disabled) { background:var(--border); color:var(--text); }

    /* パーティクル */
    .particle {
      position:fixed; pointer-events:none; border-radius:50%; z-index:999;
      animation:fly 1.1s ease-out forwards;
    }
    @keyframes fly {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
    }

    html:fullscreen body { padding: 32px 22px; }
    html:fullscreen #lottery-view,
    html:fullscreen .tv-inner { max-width: 1080px; }

    @media (max-width: 640px) {
      html { font-size: 15px; }
      body { padding: 28px 14px; }
      #lottery-view { gap: 22px; }
      h1 { font-size: 2rem; }
      #odai-display { padding: 38px 24px; min-height: 190px; }
      .odai-text { font-size: 1.35rem; }
      .timer-bar { flex-wrap: wrap; }
      .timer-bar-label { min-width: 100%; order: -1; }
      #start-small-btn { flex: 1; }
      .tv-ring-wrap { width: 280px; height: 280px; }
      #tv-digits { font-size: 4.6rem; }
      .tv-odai-mini .mini-text { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<button id="fullscreen-btn" type="button" onclick="toggleFullscreen()">全画面</button>

<!-- ===== 抽選ビュー ===== -->
<div id="lottery-view">
  <header>
    <div class="label">Speech Roulette</div>
    <h1>3分間スピーチ<br><span>お題抽選器</span></h1>
    <p class="meta" id="count-meta">— loading —</p>
  </header>

  <div class="display-wrap" id="display-wrap">
    <div id="category-badge">CATEGORY</div>
    <div id="odai-display">
      <p class="odai-text placeholder-text">「抽選する」ボタンを押してください</p>
    </div>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div id="progress-bar"></div>
  </div>

  <div class="btn-row">
    <button id="draw-btn" onclick="drawOdai()">🎲 お題を抽選する</button>
    <button id="skip-btn" onclick="skipAnimation()">スキップ</button>
  </div>

  <!-- コンパクトタイマーバー -->
  <div class="timer-bar">
    <div class="timer-bar-digits" id="bar-digits">3:00</div>
    <div class="timer-bar-label" id="bar-label">お題が決まったら「スタート」を押してください</div>
    <button id="start-small-btn" onclick="startTimer()">▶ スタート</button>
  </div>

  <div id="lottery-footer"></div>
</div>

<!-- ===== タイマービュー ===== -->
<div id="timer-view">
  <div class="tv-inner">

    <!-- お題ミニ表示 -->
    <div class="tv-odai-mini">
      <div class="mini-cat" id="tv-mini-cat">CATEGORY</div>
      <div class="mini-text" id="tv-mini-text">お題がここに表示されます</div>
    </div>

    <!-- 大きな円形タイマー -->
    <div class="tv-ring-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle id="tv-ring-bg"   cx="50" cy="50" r="45" fill="none" stroke-width="4"/>
        <circle id="tv-ring-fill" cx="50" cy="50" r="45" fill="none" stroke-width="4"/>
      </svg>
      <div class="tv-digits-wrap">
        <div id="tv-digits">3:00</div>
        <div id="tv-phase-label">READY</div>
      </div>
    </div>

    <!-- マイルストーンメッセージ -->
    <div id="milestone-msg"></div>

    <!-- ボタン -->
    <div class="tv-btn-row">
      <button id="tv-pause-btn" onclick="togglePause()">⏸ 一時停止</button>
      <button id="tv-stop-btn"  onclick="stopTimer()">✕ 終了</button>
    </div>

  </div>
</div>

<script>
// =============================================
//  お題リスト（就職・キャリア特化版）
// =============================================
const odaiList = [
  { cat:"キャリア", text:"5年後の自分は、どんなエンジニア／デザイナーになっていたい？" },
  { cat:"キャリア", text:"仕事において一番大切にしたい「譲れない条件」は何？" },
  { cat:"キャリア", text:"あなたにとって「プロフェッショナル」とは何か、具体的に定義して。" },
  { cat:"キャリア", text:"在宅勤務（リモート）と出社、自分に合っているのはどっち？理由も添えて。" },
  { cat:"キャリア", text:"「納期」と「クオリティ」、究極の選択を迫られたらどうする？" },
  { cat:"キャリア", text:"スペシャリストとジェネラリスト、どちらを目指したいか。" },
  { cat:"キャリア", text:"働く目的は「生活のため」？それとも「自己実現」？" },
  { cat:"キャリア", text:"AIに奪われない「自分だけの武器」は何だと思う？" },

  { cat:"キャリア", text:"理想の職場環境（文化・制度・雰囲気）をプレゼンして。" },

  { cat:"就職活動", text:"面接で「最後に質問はありますか？」と言われたら何を聞く？" },

  { cat:"自己分析", text:"自分の性格を「プログラミング言語」に例えると何？その理由は？" },
  { cat:"自己分析", text:"自分の強みを「漢字一文字」で表し、その理由を語って。" },
  { cat:"自己分析", text:"「柔軟性がある」と言えるエピソードを一つ教えて。" },
  { cat:"自己分析", text:"これまでで一番の「成功体験」を、学べたことも含めて語って。" },
  { cat:"自己分析", text:"挫折した時に自分に掛ける言葉や、立ち直り方のルーティンは？" },
  { cat:"自己分析", text:"一番「集中力」を発揮できる状況や時間帯はいつ？" },
  { cat:"自己分析", text:"プレッシャーを楽しめるタイプか、苦手なタイプか。その理由は？" },
  { cat:"自己分析", text:"この訓練を通じて、一番「成長した」と感じるポイントは？" },
  { cat:"自己分析", text:"自分が会社に貢献できる「最大のこと」は何か？" },
  { cat:"自己分析", text:"「謙虚さ」と「自信」、仕事ではどちらがより重要か。" },
  { cat:"自己分析", text:"「誠実さ」を仕事の場でどう具体的に表現するか。" },
  { cat:"自己分析", text:"仕事上のストレスを溜め込まないために実践していることは？" },
  { cat:"自己分析", text:"座右の銘と、それが仕事にどう活きると思うかを語って。" },
  { cat:"自己分析", text:"自分を採用する企業にとって、最大のメリットを売り込んでみて。" },
  { cat:"自己分析", text:"今の自分に正直に向き合って、一番強化すべき点は何か。" },
];

const catColors = {
  "キャリア":        "#f5c842",
  "就職活動":        "#ff6b6b",
  "スキル・学習":    "#4ecdc4",
  "チーム・人間関係":"#a78bfa",
  "自己分析":        "#fb923c",
};

// =============================================
//  Web Audio API
// =============================================
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function makeNoise(sec=0.05) {
  const c=ac(), buf=c.createBuffer(1,c.sampleRate*sec,c.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  return buf;
}

/* ドラムロール カチッ音 */
function playClick(pitch=1) {
  const c=ac(), t=c.currentTime;
  const src=c.createBufferSource(); src.buffer=makeNoise();
  const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1800*pitch;
  const g1=c.createGain(); g1.gain.setValueAtTime(.6,t); g1.gain.exponentialRampToValueAtTime(.001,t+.045);
  src.connect(hp); hp.connect(g1); g1.connect(c.destination); src.start(t); src.stop(t+.05);
  const osc=c.createOscillator(); osc.type='sine';
  osc.frequency.setValueAtTime(300*pitch,t); osc.frequency.exponentialRampToValueAtTime(80,t+.045);
  const g2=c.createGain(); g2.gain.setValueAtTime(.38,t); g2.gain.exponentialRampToValueAtTime(.001,t+.055);
  osc.connect(g2); g2.connect(c.destination); osc.start(t); osc.stop(t+.06);
}

/* 確定ファンファーレ */
function playFanfare() {
  const c=ac(); [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    const t=c.currentTime+i*.11;
    [[f,'triangle',.18],[f*2.756,'sine',.10],[f*5.4,'sine',.05]].forEach(([freq,type,vol])=>{
      const o=c.createOscillator(); o.type=type; o.frequency.value=freq;
      const g=c.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.015);
      g.gain.exponentialRampToValueAtTime(.001,t+.75);
      o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+.78);
    });
  });
}

/* 1分経過チャイム — 柔らかいベル2打 */
function playMinuteBell(pitch=1) {
  const c=ac();
  [0, 0.3].forEach(delay => {
    const t=c.currentTime+delay;
    [[440*pitch,'triangle',.15],[440*pitch*2.2,'sine',.08]].forEach(([freq,type,vol])=>{
      const o=c.createOscillator(); o.type=type; o.frequency.value=freq;
      const g=c.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.012);
      g.gain.exponentialRampToValueAtTime(.001,t+.55);
      o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+.58);
    });
  });
}

/* 残り30秒 — 軽快な2連打（高め） */
function playWarning30() {
  const c=ac();
  [0, 0.18].forEach(delay => {
    const t=c.currentTime+delay;
    const o=c.createOscillator(); o.type='sine'; o.frequency.value=880;
    const g=c.createGain(); g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.2);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+.22);
  });
}

/* 残り10秒 — 毎秒チクタク */
function playTick10() {
  const c=ac(), t=c.currentTime;
  const src=c.createBufferSource(); src.buffer=makeNoise(.03);
  const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3000;
  const g=c.createGain(); g.gain.setValueAtTime(.5,t); g.gain.exponentialRampToValueAtTime(.001,t+.04);
  src.connect(hp); hp.connect(g); g.connect(c.destination); src.start(t); src.stop(t+.04);
}

/* 時報 短音1発（440Hz、約70ms）*/
function playJikouShort() {
  const c = ac(), t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 440;
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.32, t + 0.008);
  g.gain.setValueAtTime(0.32, t + 0.065);
  g.gain.linearRampToValueAtTime(0, t + 0.08);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.09);
}

/* 時報 長音（880Hz）— duration 秒間キープ後フェードアウト */
function playJikouLong(duration) {
  duration = duration || 3.5;
  const c = ac(), t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 880;
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.35, t + 0.01);
  g.gain.setValueAtTime(0.35, t + duration);
  g.gain.linearRampToValueAtTime(0, t + duration + 0.25);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + duration + 0.3);
}

/* スタート合図：短音×3（0・1・2秒）→ 長音（3秒目〜） */
function playStartSignal() {
  const c = ac();
  // 短音 3発（setValueAtTime で先スケジューリング）
  [0, 1, 2].forEach(i => {
    const t = c.currentTime + i;
    const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 440;
    const g = c.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.32, t + 0.008);
    g.gain.setValueAtTime(0.32, t + 0.065);
    g.gain.linearRampToValueAtTime(0, t + 0.08);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.09);
  });
  // 長音（3秒目から1.8秒間）
  const tL = c.currentTime + 3;
  const oL = c.createOscillator(); oL.type = 'sine'; oL.frequency.value = 880;
  const gL = c.createGain();
  gL.gain.setValueAtTime(0, tL);
  gL.gain.linearRampToValueAtTime(0.35, tL + 0.01);
  gL.gain.setValueAtTime(0.35, tL + 3.0);
  gL.gain.linearRampToValueAtTime(0, tL + 3.25);
  oL.connect(gL); gL.connect(c.destination);
  oL.start(tL); oL.stop(tL + 3.3);
}

/* 終了時：短音×3（0・1・2秒後）→ 長音（3秒後〜）を一括スケジュール */
function playEndSignal() {
  const c = ac();
  // 短音 3発（1秒刻み）
  [0, 1, 2].forEach(i => {
    const t = c.currentTime + i;
    const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 440;
    const g = c.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.32, t + 0.008);
    g.gain.setValueAtTime(0.32, t + 0.065);
    g.gain.linearRampToValueAtTime(0, t + 0.08);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.09);
  });
  // 長音（3秒後〜 4秒間）
  const tL = c.currentTime + 3;
  const oL = c.createOscillator(); oL.type = 'sine'; oL.frequency.value = 880;
  const gL = c.createGain();
  gL.gain.setValueAtTime(0, tL);
  gL.gain.linearRampToValueAtTime(0.35, tL + 0.01);
  gL.gain.setValueAtTime(0.35, tL + 4.0);
  gL.gain.linearRampToValueAtTime(0, tL + 4.25);
  oL.connect(gL); gL.connect(c.destination);
  oL.start(tL); oL.stop(tL + 4.3);
}

/* 終了時：0:00 で長音4秒 */
function playTimerEnd() { playJikouLong(4.0); }

// =============================================
//  状態
// =============================================
document.getElementById('count-meta').textContent = `全 ${odaiList.length} パターン収録`;

const display  = document.getElementById('odai-display');
const badge    = document.getElementById('category-badge');
const wrap     = document.getElementById('display-wrap');
const drawBtn  = document.getElementById('draw-btn');
const skipBtn  = document.getElementById('skip-btn');
const progWrap = document.getElementById('progress-wrap');
const progBar  = document.getElementById('progress-bar');
const footerEl = document.getElementById('lottery-footer');
const barDigits= document.getElementById('bar-digits');
const barLabel = document.getElementById('bar-label');
const startSmallBtn = document.getElementById('start-small-btn');
const fullscreenBtn = document.getElementById('fullscreen-btn');

let isRolling=false, finalOdai=null, lotteryDone=false;
const TOTAL=90, INTERVAL=52;
let intervalId=null;

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {
      fullscreenBtn.textContent = '全画面にできません';
      setTimeout(() => fullscreenBtn.textContent = '全画面', 1800);
    });
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  fullscreenBtn.textContent = document.fullscreenElement ? '全画面解除' : '全画面';
});

document.addEventListener('keydown', (event) => {
  if (event.key.toLowerCase() !== 'f') return;
  if (event.metaKey || event.ctrlKey || event.altKey) return;
  event.preventDefault();
  toggleFullscreen();
});

function setDisplay(odai) {
  display.innerHTML=`<p class="odai-text">${odai.text}</p>`;
  const col=catColors[odai.cat]||'#fff';
  badge.textContent=odai.cat; badge.style.background=col+'20';
  badge.style.color=col; badge.style.border=`1px solid ${col}44`;
  badge.classList.add('active');
}

function spawnParticles(el) {
  const cols=Object.values(catColors);
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<28;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=5+Math.random()*9, ang=Math.random()*Math.PI*2, d=70+Math.random()*190;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      --tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;
      animation-duration:${.7+Math.random()*.6}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),1400);
  }
}

function skipAnimation() {
  if(!isRolling) return; clearInterval(intervalId); finalize();
}

function drawOdai() {
  if(isRolling) return; isRolling=true; lotteryDone=false;
  finalOdai=odaiList[Math.floor(Math.random()*odaiList.length)];
  display.classList.remove('decided'); display.classList.add('rolling');
  wrap.classList.add('rolling'); badge.classList.remove('active');
  badge.textContent='抽選中...'; badge.style.cssText='';
  drawBtn.disabled=true; drawBtn.textContent='抽選中...';
  skipBtn.classList.add('visible');
  progWrap.classList.add('visible'); progBar.style.width='0%';
  footerEl.textContent=''; startSmallBtn.disabled=true;

  let count=0, beatPh=0;
  intervalId=setInterval(()=>{
    const r=odaiList[Math.floor(Math.random()*odaiList.length)];
    display.innerHTML=`<p class="odai-text">${r.text}</p>`; count++;
    progBar.style.width=`${(count/TOTAL)*100}%`;
    const progress=count/TOTAL, every=Math.max(1,Math.round(1+progress*6));
    if(++beatPh%every===0) playClick(.7+progress*.6);
    if(count>=TOTAL){clearInterval(intervalId);finalize();}
  }, INTERVAL);
}

function finalize() {
  isRolling=false; lotteryDone=true;
  setDisplay(finalOdai);
  display.classList.remove('rolling'); display.classList.add('decided');
  wrap.classList.remove('rolling');
  progBar.style.width='100%';
  setTimeout(()=>progWrap.classList.remove('visible'),800);
  playFanfare(); spawnParticles(display);
  drawBtn.disabled=false; drawBtn.textContent='🎲 もう一度抽選する';
  skipBtn.classList.remove('visible');
  footerEl.textContent=`カテゴリ: ${finalOdai.cat}`;
  barLabel.textContent='準備ができたら「スタート」を押してください';
  startSmallBtn.disabled=false;

  // タイマービューのお題をセット
  document.getElementById('tv-mini-cat').textContent=finalOdai.cat;
  document.getElementById('tv-mini-text').textContent=finalOdai.text;
  const col=catColors[finalOdai.cat]||'#fff';
  document.getElementById('tv-mini-cat').style.color=col;
}

// =============================================
//  3分タイマー
// =============================================
const TOTAL_SEC=180;
let timerSec=TOTAL_SEC, timerRunning=false, timerId=null, isPaused=false;

const tvDigits   = document.getElementById('tv-digits');
const tvPhase    = document.getElementById('tv-phase-label');
const tvRingFill = document.getElementById('tv-ring-fill');
const tvPauseBtn = document.getElementById('tv-pause-btn');
const milestoneEl= document.getElementById('milestone-msg');
const lotteryView= document.getElementById('lottery-view');
const timerView  = document.getElementById('timer-view');
const CIRC       = 2*Math.PI*45; // ≒ 282.74

function fmtTime(sec) {
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}

function updateSmallTimer() {
  barDigits.textContent = fmtTime(timerSec);
}

function updateTimerView() {
  tvDigits.textContent = fmtTime(timerSec);
  tvRingFill.style.strokeDasharray  = CIRC;
  tvRingFill.style.strokeDashoffset = CIRC*(1-timerSec/TOTAL_SEC);

  tvDigits.classList.remove('warning','danger');
  tvRingFill.classList.remove('warning','danger');
  if(timerSec<=30&&timerSec>10){ tvDigits.classList.add('warning'); tvRingFill.classList.add('warning'); }
  else if(timerSec<=10)        { tvDigits.classList.add('danger');  tvRingFill.classList.add('danger'); }

  // フェーズラベル
  if(timerSec>120)      tvPhase.textContent='INTRO';
  else if(timerSec>60)  tvPhase.textContent='MAIN';
  else if(timerSec>30)  tvPhase.textContent='CLOSING';
  else if(timerSec>10)  tvPhase.textContent='LAST 30s';
  else if(timerSec>0)   tvPhase.textContent='FINISH!';
}

let milestoneTimeout=null;
function showMilestone(msg) {
  if(milestoneTimeout) clearTimeout(milestoneTimeout);
  milestoneEl.textContent=msg;
  milestoneEl.classList.remove('flash');
  void milestoneEl.offsetWidth; // reflow
  milestoneEl.classList.add('flash');
  milestoneTimeout=setTimeout(()=>milestoneEl.classList.remove('flash'),6600);
}

function startTimer() {
  if(!lotteryDone) {
    barLabel.textContent='先にお題を抽選してください！'; return;
  }
  ac(); // AudioContext を起動
  timerSec=TOTAL_SEC; timerRunning=true; isPaused=false;
  lotteryView.style.display='none';
  timerView.classList.add('active');
  updateTimerView();
  tvPauseBtn.textContent='⏸ 一時停止'; tvPauseBtn.classList.remove('paused');
  tvPhase.textContent='READY';

  // スタート時：短音×3 → 3秒後に長音＆カウントダウン＆メッセージ同時
  playStartSignal();
  setTimeout(() => {
    if(!timerRunning) return; // 途中でstopされた場合
    showMilestone('🔔 スピーチ スタート！');
    tvPhase.textContent='INTRO';
    timerId=setInterval(()=>{
      if(isPaused) return;
      if(timerSec<=0){
        clearInterval(timerId); timerRunning=false;
        tvDigits.textContent='0:00'; tvPhase.textContent='TIME UP';
        tvPauseBtn.disabled=true;
        // 終了音は残り3秒時点で一括スケジュール済み
        showMilestone('⏰ TIME UP — お疲れ様でした！');
        return;
      }
      timerSec--; updateTimerView(); updateSmallTimer();

      // マイルストーン音・メッセージ
      if(timerSec===120){ playMinuteBell(1.0); showMilestone('⏱ 残り 2:00 — MAIN へ'); }
      if(timerSec===60) { playMinuteBell(1.2); showMilestone('⏱ 残り 1:00 — そろそろまとめへ'); }
      if(timerSec===30) { playWarning30();     showMilestone('⚡ 残り 30秒！'); }
      // 残り10〜4秒：チクタク音
      if(timerSec>3&&timerSec<=10){ playTick10(); }
      // 残り3秒：短音×3 + 長音を AudioContext タイムラインに一括スケジュール
      if(timerSec===3){ playEndSignal(); }
    },1000);
  }, 3000); // 短音3発(3s) = 長音スタートと同時にカウントダウン開始
}

function togglePause() {
  if(!timerRunning) return;
  isPaused=!isPaused;
  if(isPaused){
    tvPauseBtn.textContent='▶ 再開'; tvPauseBtn.classList.add('paused');
    tvPhase.textContent='PAUSED';
  } else {
    tvPauseBtn.textContent='⏸ 一時停止'; tvPauseBtn.classList.remove('paused');
  }
}

function stopTimer() {
  clearInterval(timerId); timerRunning=false; isPaused=false;
  timerSec=TOTAL_SEC;
  updateSmallTimer();
  timerView.classList.remove('active');
  lotteryView.style.display='flex';
  tvPauseBtn.disabled=false;
  tvPauseBtn.textContent='⏸ 一時停止'; tvPauseBtn.classList.remove('paused');
  barLabel.textContent='準備ができたら「スタート」を押してください';
}

// 初期化
updateSmallTimer();
</script>
